<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Z.ai Enhancer</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <div class="logo">Z</div>
    <div>
      <h1>Z.ai Enhancer</h1>
      <p class="muted">v0.3.0</p>
    </div>
  </header>

  <main>
    <button id="openPanel" type="button" class="primary">
      🚀 Abrir painel no site
    </button>
    <p class="hint" id="panelHint">Use o botão flutuante no canto inferior direito de chat.z.ai — não precisa mais abrir este popup.</p>

    <hr />

    <label class="row">
      <span>Som ao concluir</span>
      <input type="checkbox" id="soundEnabled" />
    </label>
    <label class="row">
      <span>Toast visual</span>
      <input type="checkbox" id="toastEnabled" />
    </label>
    <label class="row">
      <span>Notificação nativa</span>
      <input type="checkbox" id="nativeEnabled" />
    </label>
    <label class="row">
      <span>Volume</span>
      <input type="range" id="soundVolume" min="0" max="1" step="0.05" />
    </label>

    <div class="actions">
      <button id="testSound" type="button">🔊 Testar som</button>
      <button id="testToast" type="button">🔔 Testar toast</button>
    </div>

    <p class="status" id="status"></p>
  </main>

  <script src="popup.js"></script>
</body>
</html>
